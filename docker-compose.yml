services:
  ingest-api:
    build: ./services/ingest-api
    ports:
      - "${INGEST_PORT:-8001}:8001"
    environment:
      - INGEST_PORT=8001
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  processor:
    build: ./services/processor
    ports:
      - "${PROCESSOR_PORT:-8002}:8002"
    environment:
      - PROCESSOR_PORT=8002
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  dashboard-api:
    build: ./services/dashboard-api
    ports:
      - "${DASHBOARD_PORT:-8003}:8003"
    environment:
      - DASHBOARD_PORT=8003
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
